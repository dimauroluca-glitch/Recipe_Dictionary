<!DOCTYPE html>
<html lang="it">
    <head>
        <title>Dizionario di Ricette</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --primary-color: #ffca28;
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
        }
        * {
            color: #f8fafc;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent !important;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .sottotitolo {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 40px;
            text-align: center;
        }
        .Cassa-interfaccia {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: -10px;
        }
        select {
            padding: 14px 16px;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }
        select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        button {
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            background: #ffffff;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        button:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
        }

        button:active {
            transform: translateY(0);
        }
        #risultati {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .scheda-ricetta {
            display: block;
            text-decoration: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 14px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        .scheda-ricetta:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }
        .scheda-ricetta h3 {
            margin: 0 0 6px 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
        }
        .scheda-ricetta p {
            margin: 0 0 12px 0;
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .scheda-ricetta .badge-video {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-color);
            font-size: 0.8rem;
            font-weight: 650;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .messaggio-vuoto {
            color: #94a3b8;
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        @media screen and (max-width: 768px) {
            body {
                padding: 20px 16px;
            }
            h1 {
                font-size: 2rem;
            }
            .Cassa-interfaccia {
                padding: 20px;
            }
            button:hover, .scheda-ricetta:hover {
                transform: none;
                box-shadow: none;
            }
            .scheda-ricetta:active {
                background: rgba(255, 255, 255, 0.15);
            }
        }
        </style>
    </head>
    <body>
            <h1>Dizionario di ricette</h1>
            <div class="sottotitolo">Trova piatti fantastici con ciò che hai in frigo</div>
            <div class="Cassa-interfaccia">
                <label for="Ingredienti">Scegli un ingrediente</label>
                <select id="Ingredienti" name="Ingredienti">
                    <option value="farina">Farina</option>
                    <option value="uova">Uova</option>
                    <option value="cereali">Cereali</option>
                    <option value="latte">Latte</option>
                    <option value="burro">Burro</option>
                    <option value="ragù">Ragù</option>
                    <option value="cipolla">Cipolla</option>
                    <option value="formaggio">Formaggio</option>
                    <option value="patate">Patate</option>
                    <option value="miele">Miele</option>
                    <option value="caffè">Caffè</option>
                </select>
                <button id="bottone-cerca">Cerca Ricette</button>
            </div>
            <div id="risultati"></div>
        <script src="dizionario_di_ricette.js"></script>
    </body>
</html>
